name: Update static docs

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC nightly
  workflow_dispatch: # allow manual runs

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Fetch docs from skeleton.dev
        run: uv run --extra fetch python index.py

      - name: Run integrity tests
        run: uv run --group dev pytest tests/test_audit.py -v

      - name: Commit updated static files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skeleton_ui_mcp_server/static/
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: nightly static docs update $(date -u +%Y-%m-%d)"

      - name: Push changes
        run: git push
